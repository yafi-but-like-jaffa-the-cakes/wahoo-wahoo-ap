pull_request_rules:
  - name: Auto-merge for dependency bump pull requests
    conditions:
      - or:
          - author=dependabot[bot]
          - author=github-actions[bot]
          - author=yafi-but-like-jaffa-the-cakes
      - or:
          - label=dependencies
          - label=update
    actions:
      merge:
        method: merge
